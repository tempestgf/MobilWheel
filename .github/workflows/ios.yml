name: iOS Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ios-client/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ios-client/**'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build iOS App (Archive)
        working-directory: ios-client/MobilWheel
        run: |
          xcodebuild clean archive \
            -project MobilWheel.xcodeproj \
            -scheme MobilWheel \
            -archivePath $PWD/build/MobilWheel.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA
        working-directory: ios-client/MobilWheel
        run: |
          mkdir -p Payload
          cp -R build/MobilWheel.xcarchive/Products/Applications/MobilWheel.app Payload/
          zip -qr MobilWheel-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MobilWheel-IPA
          path: ios-client/MobilWheel/MobilWheel-unsigned.ipa
